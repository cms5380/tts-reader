<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>텍듣</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon.png?v=2">
<link rel="icon" type="image/png" href="icon.png?v=2">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #1a1a1e;
    --surface2: #242428;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --faint: #444;
    --accent: #e8c97a;
    --accent-dim: rgba(232,201,122,0.12);
    --danger: #e07070;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  header { padding: 12px 0 4px; display: flex; align-items: baseline; gap: 10px; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  header span { font-size: 12px; color: var(--muted); }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }

  #upload-section { display: block; }
  #reader-section { display: none; }

  .drop-zone { padding: 30px 24px; text-align: center; cursor: pointer; border: 1.5px dashed var(--faint); border-radius: var(--radius); transition: border-color 0.2s, background 0.2s; background: transparent; }
  .drop-zone.hover { border-color: var(--accent); background: var(--accent-dim); }
  .drop-icon { font-size: 36px; margin-bottom: 10px; display: block; }
  .drop-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .drop-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }
  #file-input { display: none; }

  .library { margin-top: 4px; }
  .library-title { font-size: 14px; font-weight: 500; color: var(--muted); padding: 8px 0; }
  .library-list { display: flex; flex-direction: column; gap: 8px; }
  .lib-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
  }
  .lib-item:active { background: var(--surface2); }
  .lib-info { min-width: 0; flex: 1; }
  .lib-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .lib-progress { width: 60px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .lib-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; }
  .lib-delete {
    background: none; border: none; color: var(--faint); font-size: 16px; cursor: pointer; padding: 6px 2px 6px 10px; flex-shrink: 0;
  }
  .lib-delete:active { color: var(--danger); }

  .file-bar { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); }
  .file-info { min-width: 0; }
  .file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .file-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .lang-select { font-size: 13px; font-family: 'Noto Sans KR', sans-serif; background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; cursor: pointer; outline: none; -webkit-appearance: none; }

  #text-display { padding: 16px; height: 280px; overflow-y: auto; font-size: 15px; line-height: 1.9; color: var(--text); white-space: pre-wrap; word-break: break-word; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
  #text-display::-webkit-scrollbar { width: 3px; }
  #text-display::-webkit-scrollbar-track { background: transparent; }
  #text-display::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 4px; }

  .sentence { cursor: pointer; border-radius: 4px; padding: 2px 3px; transition: background 0.15s; }
  .sentence.done { color: var(--faint); }
  .sentence.current { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
  .sentence:active { opacity: 0.7; }

  .progress-wrap { padding: 0 16px 10px; }
  .progress-track { height: 3px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; width: 0%; transition: width 0.4s ease; }
  .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 7px; }

  .controls-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .btn-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; }

  .btn { border: 0.5px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'Noto Sans KR', sans-serif; border-radius: var(--radius-sm); cursor: pointer; transition: opacity 0.15s, transform 0.1s, background 0.15s; font-size: 13px; padding: 8px 14px; white-space: nowrap; }
  .btn:active { transform: scale(0.95); opacity: 0.8; }

  .btn-play { width: 56px; height: 56px; border-radius: 50%; font-size: 22px; background: var(--accent); color: #0e0e10; border: none; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Noto Sans KR', sans-serif; }
  .btn-play:active { transform: scale(0.93); }

  .sliders { display: flex; flex-direction: column; gap: 10px; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-label { font-size: 12px; color: var(--muted); width: 32px; flex-shrink: 0; }
  .slider-val { font-size: 12px; color: var(--muted); width: 38px; text-align: right; flex-shrink: 0; }

  input[type=range] { flex: 1; height: 3px; -webkit-appearance: none; appearance: none; background: var(--surface2); border-radius: 4px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 3px solid var(--bg); box-shadow: 0 0 0 1px var(--accent); }

  .btn-change { width: 100%; margin-top: 12px; padding: 10px; text-align: center; color: var(--muted); border-color: var(--border); font-size: 13px; background: transparent; border-radius: var(--radius-sm); }

  .no-support { padding: 40px 24px; text-align: center; color: var(--danger); font-size: 14px; line-height: 1.7; }

  .search-bar { padding: 8px 12px; border-bottom: 0.5px solid var(--border); background: var(--surface); }
  .search-inner { display: flex; align-items: center; gap: 6px; }
  .search-inner input { flex: 1; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; font-size: 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; outline: none; }
  .search-inner input:focus { border-color: var(--accent); }
  .search-count { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 40px; text-align: center; }
  .search-nav { width: 30px; height: 30px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .search-nav:active { transform: scale(0.93); }
  .search-close { background: transparent; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .sentence.highlight { background: rgba(232,201,122,0.25); border-radius: 4px; }
  .sentence.highlight-active { background: var(--accent); color: #0e0e10; font-weight: 500; border-radius: 4px; }

  .search-results { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .search-results:empty { display: none; }
  .search-result-item { padding: 10px 12px; font-size: 13px; line-height: 1.5; color: var(--text); border-top: 0.5px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .search-result-item:active { background: var(--accent-dim); }
  .search-result-item .sr-num { color: var(--muted); font-size: 11px; margin-right: 6px; }
  .search-result-item mark { background: var(--accent); color: #0e0e10; border-radius: 2px; padding: 0 2px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease forwards; }
</style>
</head>
<body>
<div id="app">
  <div id="upload-section">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <span class="drop-icon">📄</span>
      <div class="drop-title">파일을 선택하세요</div>
      <div class="drop-sub">.txt 파일을 탭하여 불러오기</div>
    </div>
    <input type="file" id="file-input" accept=".txt,text/plain" multiple>
    <div class="library" id="library">
      <div class="library-title" id="library-title" style="display:none">저장된 파일</div>
      <div class="library-list" id="library-list"></div>
    </div>
  </div>

  <div id="reader-section">
    <div class="card fade-in">
      <div class="file-bar">
        <div class="file-info">
          <div class="file-name" id="file-name">—</div>
          <div class="file-meta" id="file-meta">0 문장</div>
        </div>
        <select class="lang-select" id="lang-select">
          <option value="ko-KR">🇰🇷 한국어</option>
        </select>
      </div>

      <div class="search-bar" id="search-bar" style="display:none">
        <div class="search-inner">
          <input type="text" id="search-input" placeholder="찾을 내용 입력..." autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="search-nav" id="search-go">찾기</button>
          <span class="search-count" id="search-count"></span>
          <button class="search-close" id="search-close">✕</button>
        </div>
        <div id="search-results" class="search-results"></div>
      </div>

      <div id="text-display"></div>

      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-info">
          <span id="pos-label">0 / 0</span>
          <span id="time-label">—</span>
        </div>
      </div>
    </div>

    <div class="controls-card fade-in">
      <div class="btn-row">
        <button class="btn" id="btn-restart">↩ 처음</button>
        <button class="btn" id="btn-prev">◀ 이전</button>
        <button class="btn btn-play" id="btn-play">▶</button>
        <button class="btn" id="btn-next">다음 ▶</button>
        <button class="btn" id="btn-search">🔍</button>
      </div>

      <div class="sliders">
        <div class="slider-row">
          <span class="slider-label">속도</span>
          <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
          <span class="slider-val" id="rate-val">1.0x</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">음높이</span>
          <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
          <span class="slider-val" id="pitch-val">1.0</span>
        </div>
        <div class="slider-row">
          <span class="slider-label">볼륨</span>
          <input type="range" id="vol" min="0" max="1" step="0.05" value="1">
          <span class="slider-val" id="vol-val">100%</span>
        </div>
      </div>

      <button class="btn btn-change" id="btn-change">다른 파일 열기</button>
    </div>
  </div>
</div>

<script>
const synth = window.speechSynthesis;
if (!synth) {
  document.getElementById('app').innerHTML = '<div class="no-support">이 브라우저는 음성 합성(TTS)을 지원하지 않습니다.<br>Safari 또는 Chrome을 사용해 주세요.</div>';
} else {

let sentences = [], idx = 0, playing = false;
let currentFileName = '', currentFileId = '';
let rawText = '';

const $ = id => document.getElementById(id);
const dropZone = $('drop-zone');
const fileInput = $('file-input');

const DB_NAME = 'tts_reader';
const DB_VER = 2;
const DB_STORE = 'files';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = req.result;
      if (!db.objectStoreNames.contains(DB_STORE)) {
        db.createObjectStore(DB_STORE, { keyPath: 'id' });
      }
      if (db.objectStoreNames.contains('progress')) {
        db.deleteObjectStore('progress');
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveFile(id, data) {
  try {
    const db = await openDB();
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put({ id, ...data });
  } catch(e) {}
}

async function loadFile(id) {
  try {
    const db = await openDB();
    return new Promise(resolve => {
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

async function loadAllFiles() {
  try {
    const db = await openDB();
    return new Promise(resolve => {
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
  } catch(e) { return []; }
}

async function deleteFile(id) {
  try {
    const db = await openDB();
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
  } catch(e) {}
}

async function saveProgress() {
  if (!currentFileId || sentences.length === 0) return;
  await saveFile(currentFileId, {
    fileName: currentFileName,
    idx: idx,
    total: sentences.length,
    lang: $('lang-select').value,
    rate: $('rate').value,
    rawText: rawText,
    savedAt: Date.now()
  });
}

async function renderLibrary() {
  const files = await loadAllFiles();
  const list = $('library-list');
  const title = $('library-title');
  if (!files.length) { list.innerHTML = ''; title.style.display = 'none'; return; }
  title.style.display = 'block';
  files.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
  list.innerHTML = files.map(f => {
    const pct = f.total > 1 ? Math.round((f.idx / (f.total - 1)) * 100) : 0;
    return '<div class="lib-item" data-id="' + f.id + '">' +
      '<div class="lib-info">' +
        '<div class="lib-name">' + escapeHtml(f.fileName) + '</div>' +
        '<div class="lib-meta">' + f.total + ' \ubb38\uc7a5 \u00b7 ' + pct + '% \uc9c4\ud589</div>' +
        '<div class="lib-progress"><div class="lib-progress-fill" style="width:' + pct + '%"></div></div>' +
      '</div>' +
      '<button class="lib-delete" data-id="' + f.id + '">\u2715</button>' +
    '</div>';
  }).join('');
  list.querySelectorAll('.lib-item').forEach(el => {
    el.addEventListener('click', async (e) => {
      if (e.target.classList.contains('lib-delete')) return;
      await openFromLibrary(el.dataset.id);
    });
  });
  list.querySelectorAll('.lib-delete').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      await deleteFile(el.dataset.id);
      renderLibrary();
    });
  });
}

async function openFromLibrary(id) {
  const saved = await loadFile(id);
  if (!saved || !saved.rawText) { alert('\ud30c\uc77c \ub370\uc774\ud130\ub97c \ucc3e\uc744 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.'); return; }
  rawText = saved.rawText;
  sentences = splitSentences(rawText);
  currentFileName = saved.fileName || '';
  currentFileId = id;
  idx = Math.min(saved.idx || 0, sentences.length - 1);
  if (saved.lang) $('lang-select').value = saved.lang;
  if (saved.rate) { $('rate').value = saved.rate; $('rate-val').textContent = parseFloat(saved.rate).toFixed(1) + 'x'; }
  $('file-name').textContent = currentFileName;
  $('file-meta').textContent = sentences.length + ' \ubb38\uc7a5';
  renderText();
  $('upload-section').style.display = 'none';
  $('reader-section').style.display = 'block';
  updateStats();
}

renderLibrary();
try { localStorage.removeItem('tts_progress'); } catch(e) {}

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('hover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

function handleFiles(files) {
  for (let i = 0; i < files.length; i++) {
    loadFileToLibrary(files[i], i === files.length - 1);
  }
}

function loadFileToLibrary(file, isLast) {
  $('drop-zone').innerHTML = '<div class="drop-title">\ubd88\ub7ec\uc624\ub294 \uc911...</div><div class="drop-sub">' + file.name + '</div>';
  const reader = new FileReader();
  reader.onload = async e => {
    const text = e.target.result;
    const sents = splitSentences(text);
    const id = file.name + '_' + Date.now();
    await saveFile(id, {
      fileName: file.name,
      idx: 0,
      total: sents.length,
      lang: 'ko-KR',
      rate: '1',
      rawText: text,
      savedAt: Date.now()
    });
    if (isLast) {
      rawText = text;
      sentences = sents;
      currentFileName = file.name;
      currentFileId = id;
      idx = 0;
      $('file-name').textContent = file.name;
      $('file-meta').textContent = sentences.length + ' \ubb38\uc7a5 \u00b7 ' + Math.round(text.length / 1000) + 'KB';
      renderText();
      $('upload-section').style.display = 'none';
      $('reader-section').style.display = 'block';
      updateStats();
      $('drop-zone').innerHTML = '<span class="drop-icon">\ud83d\udcc4</span><div class="drop-title">\ud30c\uc77c\uc744 \uc120\ud0dd\ud558\uc138\uc694</div><div class="drop-sub">.txt \ud30c\uc77c\uc744 \ud0ed\ud558\uc5ec \ubd88\ub7ec\uc624\uae30</div>';
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function splitSentences(text) {
  const cleaned = text.replace(/\r\n/g, '\n').trim();
  const parts = cleaned.split(/(?<=[.!?\u3002\uff01\uff1f])\s+|\n+/);
  return parts.map(s => s.trim()).filter(s => s.length > 1);
}

function renderText() {
  $('text-display').innerHTML = sentences.map((s, i) =>
    `<span class="sentence" id="s${i}" data-i="${i}">${escapeHtml(s)}&nbsp;</span>`
  ).join('');
  document.querySelectorAll('.sentence').forEach(el => {
    el.addEventListener('click', () => {
      const wasPlaying = playing;
      stopAll();
      idx = +el.dataset.i;
      updateStats();
      if (wasPlaying) playFrom(idx);
    });
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStats() {
  document.querySelectorAll('.sentence').forEach((el, i) => {
    el.className = 'sentence' + (i < idx ? ' done' : i === idx ? ' current' : '');
  });
  const cur = $('s' + idx);
  if (cur) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  const pct = sentences.length > 1 ? (idx / (sentences.length - 1)) * 100 : 0;
  $('progress-fill').style.width = Math.round(pct) + '%';
  $('pos-label').textContent = (idx + 1) + ' / ' + sentences.length + ' \ubb38\uc7a5';
  const remaining = sentences.length - idx;
  const rate = parseFloat($('rate').value);
  const secs = Math.round((remaining * 12) / (rate * 2.5));
  const m = Math.floor(secs / 60), s = secs % 60;
  $('time-label').textContent = '\uc57d ' + (m > 0 ? m + '\ubd84 ' : '') + s + '\ucd08 \ub0a8\uc74c';
}

let silentAudio = null;
function initSilentAudio() {
  if (silentAudio) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.value = 0.001;
  oscillator.connect(gain);
  const dest = ctx.createMediaStreamDestination();
  gain.connect(dest);
  oscillator.start();
  silentAudio = new Audio();
  silentAudio.srcObject = dest.stream;
  silentAudio.loop = true;
}

function updateMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: currentFileName || '\ud14d\ub4e3',
    artist: '',
    album: (idx + 1) + ' / ' + sentences.length + ' \ubb38\uc7a5'
  });
  navigator.mediaSession.setActionHandler('play', () => { playFrom(idx); });
  navigator.mediaSession.setActionHandler('pause', () => { stopAll(); });
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    const wp = playing; stopAll(); idx = Math.max(0, idx - 1); saveProgress(); updateStats(); if (wp) playFrom(idx);
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    const wp = playing; stopAll(); idx = Math.min(sentences.length - 1, idx + 1); saveProgress(); updateStats(); if (wp) playFrom(idx);
  });
}

const QUEUE_AHEAD = 5;
let queuedUpTo = -1;

function enqueueNext() {
  if (!playing) return;
  const next = queuedUpTo + 1;
  if (next >= sentences.length) return;
  queuedUpTo = next;
  const utt = new SpeechSynthesisUtterance(sentences[next]);
  utt.lang = $('lang-select').value;
  utt.rate = parseFloat($('rate').value);
  utt.pitch = parseFloat($('pitch').value);
  utt.volume = parseFloat($('vol').value);
  const si = next;
  utt.onstart = () => { idx = si; updateStats(); updateMediaSession(); saveProgress(); };
  utt.onend = () => {
    if (!playing) return;
    if (si + 1 >= sentences.length) { stopAll(); return; }
    enqueueNext();
  };
  utt.onerror = () => { playing = false; $('btn-play').textContent = '\u25b6'; };
  synth.speak(utt);
}

function playFrom(i) {
  if (i >= sentences.length) { stopAll(); return; }
  synth.cancel();
  idx = i;
  queuedUpTo = i - 1;
  playing = true;
  $('btn-play').textContent = '\u23f8\ufe0e';
  updateStats();
  updateMediaSession();
  initSilentAudio();
  silentAudio.play().catch(() => {});
  saveProgress();
  for (let j = 0; j < QUEUE_AHEAD && (i + j) < sentences.length; j++) {
    enqueueNext();
  }
}

function stopAll() {
  synth.cancel();
  playing = false;
  $('btn-play').textContent = '\u25b6';
  if (silentAudio) silentAudio.pause();
  saveProgress();
}

$('btn-play').addEventListener('click', () => playing ? stopAll() : playFrom(idx));
$('btn-restart').addEventListener('click', () => { const wp = playing; stopAll(); idx = 0; saveProgress(); updateStats(); if (wp) playFrom(0); });
$('btn-prev').addEventListener('click', () => { const wp = playing; stopAll(); idx = Math.max(0, idx - 1); saveProgress(); updateStats(); if (wp) playFrom(idx); });
$('btn-next').addEventListener('click', () => { const wp = playing; stopAll(); idx = Math.min(sentences.length - 1, idx + 1); saveProgress(); updateStats(); if (wp) playFrom(idx); });
$('btn-change').addEventListener('click', () => { stopAll(); $('upload-section').style.display = 'block'; $('reader-section').style.display = 'none'; currentFileName = ''; currentFileId = ''; renderLibrary(); });

$('rate').addEventListener('input', () => { $('rate-val').textContent = parseFloat($('rate').value).toFixed(1) + 'x'; updateStats(); });
$('pitch').addEventListener('input', () => { $('pitch-val').textContent = parseFloat($('pitch').value).toFixed(1); });
$('vol').addEventListener('input', () => { $('vol-val').textContent = Math.round($('vol').value * 100) + '%'; });
$('lang-select').addEventListener('change', () => { if (playing) { const i = idx; stopAll(); playFrom(i); } });

let searchResults = [], searchIdx = 0;

$('btn-search').addEventListener('click', () => {
  const bar = $('search-bar');
  const isVisible = bar.style.display !== 'none';
  bar.style.display = isVisible ? 'none' : 'block';
  if (!isVisible) { $('search-input').focus(); }
  else { clearSearch(); }
});

$('search-close').addEventListener('click', () => {
  $('search-bar').style.display = 'none';
  clearSearch();
});

$('search-go').addEventListener('click', doSearch);

$('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
  if (e.key === 'Escape') { $('search-bar').style.display = 'none'; clearSearch(); }
});

function doSearch() {
  const q = $('search-input').value.trim();
  clearSearchHighlights();
  searchResults = [];
  $('search-results').innerHTML = '';
  if (!q) { $('search-count').textContent = ''; return; }
  sentences.forEach((s, i) => {
    if (s.toLowerCase().includes(q.toLowerCase())) searchResults.push(i);
  });
  $('search-count').textContent = searchResults.length ? searchResults.length + '\uac74' : '\uc5c6\uc74c';
  if (searchResults.length) {
    searchResults.forEach(i => {
      const el = $('s' + i);
      if (el) el.classList.add('highlight');
    });
    renderSearchResults(q);
  }
}

function renderSearchResults(query) {
  const container = $('search-results');
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  container.innerHTML = searchResults.map(i => {
    const text = escapeHtml(sentences[i]);
    const highlighted = text.replace(re, '<mark>$1</mark>');
    return '<div class="search-result-item" data-si="' + i + '"><span class="sr-num">' + (i + 1) + '</span>' + highlighted + '</div>';
  }).join('');
  container.querySelectorAll('.search-result-item').forEach(el => {
    el.addEventListener('click', () => {
      const i = +el.dataset.si;
      const wasPlaying = playing;
      stopAll();
      idx = i;
      updateStats();
      if (wasPlaying) playFrom(idx);
      $('search-bar').style.display = 'none';
      clearSearch();
    });
  });
}

function clearSearchHighlights() {
  document.querySelectorAll('.sentence').forEach(el => {
    el.classList.remove('highlight', 'highlight-active');
  });
}

function clearSearch() {
  clearSearchHighlights();
  searchResults = [];
  $('search-input').value = '';
  $('search-count').textContent = '';
  $('search-results').innerHTML = '';
}

}
</script>
</body>
</html>
